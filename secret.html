<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECRET - 2P POWER</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #0f172a; /* สีพื้นหลังเข้ม ช่วยเน้นภาพและทำให้ขอบด้านข้างดูเนียนตา */
            overflow: hidden;
            position: relative;
            font-family: 'Inter', 'Sarabun', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fullscreen-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; /* เว้นระยะขอบเล็กน้อยไม่ให้ภาพชิดขอบจอเกินไปตอนแสดงผล */
        }

        .secret-img {
            max-width: 100%;
            max-height: 100%;
            /* เปลี่ยนเป็น contain เพื่อให้เห็นภาพแนวตั้งครบทั้งภาพ แม้จะดูบนจอแนวนอน */
            object-fit: contain; 
            animation: fadeIn 0.5s ease-in-out;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* เพิ่มเงาให้ตัวภาพดูมีมิติแยกจากพื้นหลัง */
        }

        /* ปุ่มย้อนกลับมินิมอล */
        .back-button {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-button:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            .back-button {
                top: 20px;
                left: 20px;
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            .fullscreen-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        BACK
    </a>

    <div class="fullscreen-container">
        <img src="kuy.jpg" alt="Secret Image" class="secret-img">
    </div>

</body>
</html>
