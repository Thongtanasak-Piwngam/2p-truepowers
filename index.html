<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME - 2P POWER</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #cbd5e1 0%, #94a3b8 100%);
            font-family: 'Sarabun', 'Inter', sans-serif;
            color: #334155;
            -webkit-font-smoothing: antialiased;
        }

        /* แถบเมนูด้านบน (Navbar) */
        .navbar {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            padding: 15px 80px; 
            background-color: rgba(203, 213, 225, 0.7);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(51, 65, 85, 0.08); 
            z-index: 1000;
        }

        .navbar .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .navbar .logo-img {
            width: 75px;       
            height: 75px;      
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .navbar .logo-container:hover .logo-img {
            transform: scale(1.05);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
        }

        .nav-links a {
            text-decoration: none;
            color: #475569; 
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover, 
        .nav-links a.active {
            color: #0369a1; 
            font-weight: 500;
        }

        /* ----- ปรับปรุง: ล็อกความยาวกรอบเท่าเดิม แต่เปิดให้เลื่อนดูรูปภาพข้างหลังได้ ----- */
        .hero-section {
            position: relative;
            width: 100%;
            height: 85vh; /* ล็อกความยาวพื้นที่ไว้เท่าเดิม (85% ของความสูงหน้าจอ) */
            margin-top: 105px; /* หลบแถบเนวบาร์ */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* บังคับไม่ให้ภาพล้นออกมานอกกรอบหลัก */
        }

        /* กล่องครอบรูปภาพที่เปิดระบบ Scroll ภายใน */
        .bg-image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow-y: auto; /* เปิดให้เลื่อนขึ้น-ลงเฉพาะตัวรูปภาพได้ */
            scrollbar-width: none; /* ซ่อนแถบเลื่อนของ Firefox */
        }

        .bg-image-container::-webkit-scrollbar {
            display: none; /* ซ่อนแถบเลื่อนของ Chrome, Safari, Edge เพื่อความสวยงาม */
        }

        /* ภาพแนวตั้งแบบยาวที่จะถูกเลื่อนดูข้างในกรอบ */
        .hero-bg-img {
            width: 100%;
            height: auto; /* ปล่อยให้ภาพยาวตามธรรมชาติของมันภายในกล่องข้อความ */
            display: block;
            pointer-events: auto; /* เปิดให้จับและเลื่อนที่ตัวภาพได้ */
            animation: fadeIn 0.8s ease-out;
        }

        /* กล่องข้อความพรรค ลอยนิ่งๆ อยู่ด้านบนอย่างมั่นคง */
        .home-container {
            position: relative;
            z-index: 2; /* ดันขึ้นมาอยู่เหนือรูปภาพเสมอ */
            max-width: 750px;
            width: 90%;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            pointer-events: none; /* ยิงผ่านเพื่อให้เวลาเลื่อนเมาส์บนกล่องนี้ยังเลื่อนรูปข้างหลังได้ */
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* เปิดปุ่มและข้อความข้างในกล่องให้กดได้ปกติ */
        .home-container * {
            pointer-events: auto; 
        }

        .main-title {
            font-family: 'Inter', 'Sarabun', sans-serif;
            font-size: 3.5rem; 
            font-weight: 700;
            letter-spacing: 2px; 
            color: #1e293b;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.5);
        }

        .subtitle {
            font-size: 1.25rem;
            color: #0369a1;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .school-name {
            font-size: 1rem;
            color: #475569;
            letter-spacing: 1px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .welcome-box {
            background-color: rgba(255, 255, 255, 0.65); 
            padding: 30px;
            border-radius: 12px;
            line-height: 1.8;
            font-size: 1.1rem;
            color: #334155;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column; 
                gap: 15px;
                padding: 20px;
            }
            .nav-links {
                gap: 20px;
            }
            .hero-section {
                margin-top: 140px;
                height: 75vh;
            }
            .home-container {
                padding: 25px 15px;
                width: 95%;
            }
            .main-title {
                font-size: 2.3rem;
            }
            .subtitle {
                font-size: 1.1rem;
            }
            .welcome-box {
                padding: 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-container">
            <img src="logo3.png" alt="2P POWER Logo" class="logo-img">
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">HOME</a></li>
            <li><a href="about.html">ABOUT 2P</a></li>
            <li><a href="members.html">MEMBERS</a></li>
            <li><a href="services.html">SERVICES</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </nav>

    <section class="hero-section">
        
        <div class="bg-image-container">
            <img src="supergood.png" alt="2P POWER Background" class="hero-bg-img">
        </div>

        <div class="home-container">
            <h1 class="main-title">2P POWERs</h1>
            <p class="subtitle">" ฟังทุกเสียง พร้อมแก้ปัญหา เพื่อพัฒนาโรงเรียน"</p>
            <p class="school-name">ผู้ลงสมัครรับเลือกตั้งสภานักเรียนโรงเรียนท่ามะกาวิทยาคม ปีการศึกษา 2569</p>

            <div class="welcome-box">
                <p>ยินดีต้อนรับสู่เว็บไซต์ทางการของ 2P POWERs พวกเรามุ่งมั่นที่จะพัฒนาโรงเรียน </p>
            </div>
        </div>

    </section>

</body>
</html>
