<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2P POWER - CONTACT</title>
    
    <!-- นำเข้าฟอนต์ชุดเดียวกับทุกหน้า (Sarabun และ Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            /* พื้นหลังไล่สีฟ้าเทาหม่นละมุน คุมธีมของพรรค */
            background: linear-gradient(180deg, #cbd5e1 0%, #94a3b8 100%);
            font-family: 'Sarabun', 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #334155; 
            overflow: hidden;
            text-align: center;
            padding: 20px;
            padding-top: 80px; 
            -webkit-font-smoothing: antialiased;
        }

       /* แถบเมนูด้านบนที่ดรอปความสว่างลงให้เนียนไปกับสีพื้นหลัง */
        .navbar {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            padding: 15px 80px; 
            background-color: rgba(203, 213, 225, 0.7); /* ใช้สีเดียวกับพื้นหลังด้านบนแต่โปร่งแสง */
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(51, 65, 85, 0.08); 
            z-index: 1000;
        }

        /* ----- อัปเดตสไตล์: เหลือแค่โลโก้โปร่งใสเพียวๆ คลีนๆ ----- */
        .navbar .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .navbar .logo-img {
            width: 35px;       
            height: 35px;      
            object-fit: contain; /* ปรับเป็น contain เพื่อให้แสดงสัดส่วนโลโก้แท้จริงที่โปร่งใสได้ครบถ้วน */
            border: none;        /* ไม่มีขอบ */
            box-shadow: none;    /* ไม่มีเงา เหลือแค่เนื้อโลโก้เน้นๆ */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* เอฟเฟกต์ดึงดูดสายตาเล็กน้อยเวลาเมาส์ชี้ */
        .navbar .logo-container:hover .logo-img {
            transform: scale(1.05); /* ขยายขนาดขึ้นนิดหน่อยแบบนุ่มนวล */
        }
        /* ------------------------------------------- */


        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
        }

        .nav-links a {
            text-decoration: none;
            color: #475569; 
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover, 
        .nav-links a.active {
            color: #0369a1; 
            font-weight: 500;
        }

        /* กล่องเนื้อหาตรงกลาง */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px; 
            max-width: 400px;
            width: 100%;
        }

        .main-title {
            font-family: 'Sarabun', sans-serif;
            font-size: 2.5rem; 
            font-weight: 600;
            letter-spacing: 1px; 
            color: #1e293b;
        }

        /* ปุ่มลิงก์ Instagram แบบกระจกฝ้า มินิมอลเรียบหรู */
        .instagram-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            padding: 18px 30px;
            background-color: rgba(255, 255, 255, 0.4); /* กล่องขาวกึ่งใส */
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            text-decoration: none;
            color: #1e293b;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* เอฟเฟกต์เวลาชี้เมาส์ */
        .instagram-card:hover {
            transform: translateY(-4px);
            background-color: rgba(255, 255, 255, 0.6);
            border-color: rgba(3, 105, 161, 0.3); /* ขอบฟ้าจางๆ */
            box-shadow: 0 8px 25px rgba(3, 105, 161, 0.1);
        }

        /* ไอคอน IG คมชัดสูง */
        .instagram-icon {
            width: 28px;
            height: 28px;
            fill: #0369a1; /* ใช้สีฟ้าน้ำทะเลลึกให้แมตช์ธีมแทนสีชมพูฉูดฉาด ดูโปรขึ้นมาก */
            transition: fill 0.3s ease;
        }

        .instagram-card:hover .instagram-icon {
            fill: #0284c7; /* สว่างขึ้นอีกนิดตอนเมาส์ชี้ */
        }

        /* ชื่อไอดีไอจี */
        .instagram-username {
            font-family: 'Inter', sans-serif;
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 600px) {
            body {
                padding-top: 140px; 
            }
            .navbar {
                flex-direction: column; 
                gap: 15px;
                padding: 20px;
            }
            .nav-links {
                gap: 20px;
            }
            .main-title {
                font-size: 2rem;
            }
            .instagram-username {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <!-- แถบเมนู -->
    <nav class="navbar">

        </a>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>

            <li><a href="members.html" >MEMBERS</a></li>
            <li><a href="services.html">SERVICES</a></li>
            <li><a href="contact.html" class="active">CONTACT</a></li>

    <div class="container">

        <a href="https://www.instagram.com/2p.truepowers?igsh=MWZmdzQ2aHZjZzA0NQ%3D%3D" target="_blank" class="instagram-card">

            <svg class="instagram-icon" viewBox="0 0 24 24">

            </svg>
            <!-- ข้อความชื่อไอจี -->
            <span class="instagram-username">@2p.TruePowers.official</span>

    </div>

</body>
</html>
